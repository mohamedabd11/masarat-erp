name: E2E Tests
on:
  workflow_dispatch:
  pull_request:
    branches: ['claude/masarat-travel-erp-design-NO1ST']
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.E2E_BASE_URL }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  E2E_BASE_URL secret not set — skipping E2E tests"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: pnpm/action-setup@v3
        if: steps.check-secrets.outputs.skip == 'false'
        with: { version: 9 }
      - uses: actions/setup-node@v4
        if: steps.check-secrets.outputs.skip == 'false'
        with: { node-version: '20', cache: 'pnpm' }
      - run: pnpm install
        if: steps.check-secrets.outputs.skip == 'false'
      - run: pnpm --filter @masarat/web exec playwright install --with-deps chromium
        if: steps.check-secrets.outputs.skip == 'false'
      - name: Run E2E tests
        if: steps.check-secrets.outputs.skip == 'false'
        run: pnpm --filter @masarat/web test:e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_FIREBASE_TOKEN: ${{ secrets.E2E_FIREBASE_TOKEN }}
