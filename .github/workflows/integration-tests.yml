name: Integration Tests (DB)

# Runs the financial integration tests (refunds, credit notes, accounting
# periods, …) against a REAL PostgreSQL service so the CRIT-10 refund GL and the
# GL-sourced reports are verified end-to-end — not just the unit math. Without a
# TEST_DATABASE_URL these suites skip; here we provide one.
on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'claude/masarat-travel-erp-design-NO1ST'
      - main

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: masarat_test
          POSTGRES_PASSWORD: test123
          POSTGRES_DB: masarat_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U masarat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://masarat_test:test123@127.0.0.1:5432/masarat_test
      TEST_DATABASE_URL: postgresql://masarat_test:test123@127.0.0.1:5432/masarat_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply schema to the test database
        working-directory: apps/web
        run: pnpm exec drizzle-kit push --force

      - name: Run tests (unit + integration against Postgres)
        working-directory: apps/web
        run: pnpm exec vitest run
