name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - 'claude/**'
  push:
    branches:
      - main
      - 'claude/**'

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. TypeScript + Lint ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript — web app
        run: pnpm --filter @masarat/web type-check

      - name: TypeScript — accounting package
        run: pnpm --filter @masarat/accounting exec tsc --noEmit 2>/dev/null || true

      - name: Lint
        run: pnpm turbo lint

  # ── 2. Unit Tests ─────────────────────────────────────────────────────────────
  test-web:
    name: Vitest — Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm --filter @masarat/web test

  test-accounting:
    name: Vitest — Accounting Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run accounting tests
        run: pnpm --filter @masarat/accounting test

  # ── 3. Build ──────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    needs: [typecheck, test-web, test-accounting]
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ""
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
      NEXT_PUBLIC_FIREBASE_APP_ID: ""
      NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @masarat/web build

      - name: Upload .next artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: apps/web/.next
          retention-days: 1

  # ── 4. E2E (main only) ────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @masarat/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @masarat/web test:e2e
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ""
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
          NEXT_PUBLIC_FIREBASE_APP_ID: ""
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "false"

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
